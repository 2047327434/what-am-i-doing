<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Am I Doing</title>
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.18);
    --glass-border: rgba(255,255,255,0.25);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.18);
    --accent: #6366f1;
    --green: #34c759;
    --text: #fff;
    --text-secondary: rgba(255,255,255,0.7);
    --radius: 20px;
    --radius-sm: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: var(--text);
    overflow-x: hidden;
  }

  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.5;
    animation: float 20s ease-in-out infinite; pointer-events: none; z-index: 0;
  }
  .bg-orb:nth-child(1) { width:500px; height:500px; background:#6366f1; top:-10%; left:-10%; animation-duration:22s; }
  .bg-orb:nth-child(2) { width:400px; height:400px; background:#ec4899; bottom:-10%; right:-10%; animation-duration:18s; animation-delay:-5s; }
  .bg-orb:nth-child(3) { width:350px; height:350px; background:#06b6d4; top:50%; left:60%; animation-duration:25s; animation-delay:-10s; }
  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-40px) scale(1.05); }
    66% { transform: translate(-20px,30px) scale(0.95); }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto; padding: 24px 16px;
    min-height: 100vh; display: flex; flex-direction: column;
    overflow-x: hidden;
  }

  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--glass-shadow);
  }

  /* ── 状态卡 ──────────────────────────────────────── */
  .status-card {
    padding: 24px 20px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 16px;
  }
  .status-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.3);
    position: relative;
  }
  .status-avatar .online-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--green); border: 2px solid #1a1a2e;
    transition: background 0.3s;
  }
  .status-avatar .online-dot.offline { background: #6b7280; }
  .status-info { flex: 1; min-width: 0; }
  .status-name { font-size: 17px; font-weight: 600; margin-bottom: 3px; }
  .status-app {
    font-size: 13px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 5px;
  }
  .status-app .app-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

  /* ── 统计条 ──────────────────────────────────────── */
  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 14px;
  }
  .stat-card { padding: 14px 16px; text-align: center; }
  .stat-value {
    font-size: 24px; font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-value.active {
    background: linear-gradient(135deg, #34c759, #30d158);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

  /* ── 应用使用排行 ────────────────────────────────── */
  .app-rank-card {
    padding: 16px 20px; margin-bottom: 14px;
  }
  .app-rank-title {
    font-size: 13px; color: var(--text-secondary); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
  }
  .app-rank-list { display: flex; flex-direction: column; gap: 8px; }
  .app-rank-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  .app-rank-item .rank-num {
    width: 20px; height: 20px; border-radius: 6px;
    background: rgba(99,102,241,0.2); color: #a5b4fc;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .app-rank-item:nth-child(1) .rank-num { background: rgba(234,179,8,0.25); color: #fbbf24; }
  .app-rank-item:nth-child(2) .rank-num { background: rgba(156,163,175,0.25); color: #9ca3af; }
  .app-rank-item:nth-child(3) .rank-num { background: rgba(180,83,9,0.25); color: #d97706; }
  .app-rank-item .rank-icon { font-size: 16px; flex-shrink: 0; }
  .app-rank-item .rank-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app-rank-item .rank-bar-wrap { width: 80px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); flex-shrink: 0; overflow: hidden; }
  .app-rank-item .rank-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #6366f1, #a78bfa); transition: width 0.5s ease; }
  .app-rank-item .rank-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; width: 68px; text-align: right; }
  .no-data { font-size: 12px; color: var(--text-secondary); text-align: center; padding: 8px 0; }

  /* ── 聊天区 ──────────────────────────────────────── */
  .chat-card {
    flex: 1; display: flex; flex-direction: column;
    min-height: 0; padding: 0; overflow: hidden;
    min-width: 0;
  }
  .chat-header {
    padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.1);
    font-weight: 600; font-size: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .chat-header .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
  .chat-messages {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px 18px;
    display: flex; flex-direction: column; gap: 8px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
    min-height: 150px; max-height: 300px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .msg {
    max-width: 80%; padding: 9px 12px;
    font-size: 13px; line-height: 1.5;
    animation: msgIn 0.3s ease;
    word-break: break-word;
    overflow-wrap: break-word;
    min-width: 0;
  }
  @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.admin {
    align-self: flex-start;
    background: rgba(99,102,241,0.25); border-radius: 14px 14px 14px 4px;
    border: 1px solid rgba(99,102,241,0.3);
  }
  .msg.viewer {
    align-self: flex-end;
    background: rgba(52,199,89,0.2); border-radius: 14px 14px 4px 14px;
    border: 1px solid rgba(52,199,89,0.3);
  }
  .msg .msg-sender { font-size:10px; opacity:0.5; margin-bottom:2px; }
  .msg .msg-time { font-size:9px; opacity:0.35; margin-top:3px; text-align:right; }

  .chat-input-bar {
    padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.1);
    display: flex; gap: 8px; align-items: center;
  }
  .chat-input {
    flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px; padding: 9px 14px;
    color: #fff; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .chat-input::placeholder { color: rgba(255,255,255,0.35); }
  .chat-input:focus { border-color: rgba(99,102,241,0.5); }
  .chat-send {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; color: #fff; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s; flex-shrink: 0;
  }
  .chat-send:hover { transform: scale(1.08); }
  .chat-send:active { transform: scale(0.95); }

  /* ── 连接状态 ────────────────────────────────────── */
  .connection-bar {
    text-align: center; padding: 8px; font-size: 11px;
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .connection-bar .conn-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse 2s infinite;
  }
  .connection-bar.disconnected .conn-dot { background: #ef4444; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  @media (max-width: 500px) {
    .container { padding: 12px 10px; }
    .status-card { padding: 18px 14px; gap: 12px; }
    .status-avatar { width: 48px; height: 48px; font-size: 20px; }
  }
</style>
</head>
<body>

<div class="bg-orb"></div>
<div class="bg-orb"></div>
<div class="bg-orb"></div>

<div class="container">

  <!-- 状态卡 -->
  <div class="glass status-card">
    <div class="status-avatar">
      👨‍💻
      <div class="online-dot offline" id="onlineDot"></div>
    </div>
    <div class="status-info">
      <div class="status-name">Admin</div>
      <div class="status-app">
        <span id="appIcon">💤</span>
        <span class="app-name" id="appName">离线</span>
      </div>
    </div>
  </div>

  <!-- 统计 -->
  <div class="stats-row">
    <div class="glass stat-card">
      <div class="stat-value" id="todayTime">0:00</div>
      <div class="stat-label">今日使用时长</div>
    </div>
    <div class="glass stat-card">
      <div class="stat-value active" id="idleTime">活跃</div>
      <div class="stat-label">空闲状态</div>
    </div>
  </div>

  <!-- 应用使用排行 -->
  <div class="glass app-rank-card">
    <div class="app-rank-title">📊 今日应用使用排行</div>
    <div class="app-rank-list" id="appRankList">
      <div class="no-data">等待数据...</div>
    </div>
  </div>

  <!-- 聊天区 -->
  <div class="glass chat-card">
    <div class="chat-header">
      <div class="dot"></div>
      消息
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-bar">
      <input class="chat-input" id="chatInput" type="text" placeholder="输入消息..." autocomplete="off">
      <button class="chat-send" id="sendBtn" title="发送">↑</button>
    </div>
  </div>

  <!-- 连接状态 -->
  <div class="connection-bar" id="connBar">
    <div class="conn-dot"></div>
    <span id="connText">正在连接...</span>
  </div>

</div>

<script>
const WS_URL = `ws://${location.host}/ws/viewer`;
const APP_ICONS = {
  'VS Code': '💻', 'Google Chrome': '🌐', 'Microsoft Edge': '🌐',
  '微信': '💬', 'Weixin': '💬', 'QQ': '🐧', '企业微信': '💼', '钉钉': '📎',
  '文件资源管理器': '📁', '记事本': '📝', 'Word': '📄', 'Excel': '📊',
  'PowerPoint': '📽️', 'Firefox': '🦊', 'Telegram': '✈️', 'Discord': '🎮',
  'Spotify': '🎵', 'PotPlayer': '🎬', 'VLC': '🎬', '终端': '⬛',
  'Python': '🐍', 'Java': '☕', 'IntelliJ IDEA': '🧠', 'WebStorm': '🌐',
  'Visual Studio': '💻', 'WorkBuddy': '🤖', 'Cursor': '💻',
  'Notion': '📝', 'Obsidian': '🗂️', 'Figma': '🎨', 'Steam': '🎮', 'eFind': '🔍',
};

const $appName = document.getElementById('appName');
const $appIcon = document.getElementById('appIcon');
const $onlineDot = document.getElementById('onlineDot');
const $todayTime = document.getElementById('todayTime');
const $idleTime = document.getElementById('idleTime');
const $appRankList = document.getElementById('appRankList');
const $chatMessages = document.getElementById('chatMessages');
const $chatInput = document.getElementById('chatInput');
const $sendBtn = document.getElementById('sendBtn');
const $connBar = document.getElementById('connBar');
const $connText = document.getElementById('connText');

let ws = null;
let reconnectDelay = 1000;

function formatDuration(seconds) {
  if (!seconds || seconds <= 0) return '0分0秒';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}小时${m}分${s}秒`;
  return `${m}分${s}秒`;
}

function formatTime(timestamp) {
  return new Date(timestamp * 1000).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function updateStatus(data) {
  $appName.textContent = data.app || '离线';
  $appIcon.textContent = APP_ICONS[data.app] || '🖥️';

  if (data.online) $onlineDot.classList.remove('offline');
  else $onlineDot.classList.add('offline');

  $todayTime.textContent = formatDuration(data.today_seconds || 0);

  const idle = data.idle_seconds || 0;
  if (idle < 60) {
    $idleTime.textContent = '活跃';
    $idleTime.className = 'stat-value active';
  } else {
    $idleTime.textContent = formatDuration(idle);
    $idleTime.className = 'stat-value';
  }

  // 更新应用排行
  updateAppRank(data.app_times || []);
}

function updateAppRank(appTimes) {
  if (!appTimes || appTimes.length === 0) {
    $appRankList.innerHTML = '<div class="no-data">等待数据...</div>';
    return;
  }

  const maxTime = appTimes[0] ? appTimes[0][1] : 1;
  let html = '';
  appTimes.forEach(([name, seconds], i) => {
    const icon = APP_ICONS[name] || '🖥️';
    const pct = maxTime > 0 ? (seconds / maxTime * 100) : 0;
    html += `
      <div class="app-rank-item">
        <div class="rank-num">${i + 1}</div>
        <div class="rank-icon">${icon}</div>
        <div class="rank-name">${escapeHtml(name)}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
        <div class="rank-time">${formatDuration(seconds)}</div>
      </div>
    `;
  });
  $appRankList.innerHTML = html;
}

function addMessage(sender, content, timestamp, animate = true) {
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  if (!animate) div.style.animation = 'none';

  const senderLabel = sender === 'admin' ? 'Admin' : '访客';
  div.innerHTML = `
    <div class="msg-sender">${senderLabel}</div>
    <div>${escapeHtml(content)}</div>
    <div class="msg-time">${formatTime(timestamp)}</div>
  `;
  $chatMessages.appendChild(div);
  $chatMessages.scrollTop = $chatMessages.scrollHeight;
}

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    $connBar.classList.remove('disconnected');
    $connText.textContent = '已连接';
    reconnectDelay = 1000;
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'status') updateStatus(msg.data);
    else if (msg.type === 'chat') addMessage(msg.data.sender, msg.data.content, msg.data.timestamp);
    else if (msg.type === 'history') msg.data.forEach(m => addMessage(m.sender, m.content, m.timestamp, false));
  };

  ws.onclose = () => {
    $connBar.classList.add('disconnected');
    $connText.textContent = '连接断开，重连中...';
    setTimeout(() => { reconnectDelay = Math.min(reconnectDelay * 1.5, 10000); connect(); }, reconnectDelay);
  };

  ws.onerror = () => ws.close();
}

function sendMessage() {
  const content = $chatInput.value.trim();
  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'chat', content }));
  $chatInput.value = '';
}

$sendBtn.addEventListener('click', sendMessage);
$chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

connect();

setInterval(async () => {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    updateStatus(data);
  } catch (e) {}
}, 10000);
</script>
</body>
</html>
