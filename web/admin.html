<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAID Admin</title>
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.18);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.2);
    --accent: #6366f1;
    --green: #34c759;
    --text: #fff;
    --text-secondary: rgba(255,255,255,0.6);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: var(--text);
    overflow-x: hidden;
  }

  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4;
    animation: float 20s ease-in-out infinite; pointer-events: none; z-index: 0;
  }
  .bg-orb:nth-child(1) { width:400px; height:400px; background:#6366f1; top:-10%; right:-5%; animation-duration:22s; }
  .bg-orb:nth-child(2) { width:300px; height:300px; background:#ec4899; bottom:0%; left:-5%; animation-duration:18s; animation-delay:-5s; }
  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-40px) scale(1.05); }
    66% { transform: translate(-20px,30px) scale(0.95); }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 960px; margin: 0 auto; padding: 24px 16px;
    min-height: 100vh; display: flex; flex-direction: column;
    overflow-x: hidden;
  }

  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--glass-shadow);
  }

  /* ── 顶部标题栏 ──────────────────────────────── */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; margin-bottom: 14px;
  }
  .top-bar h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .top-bar .badge {
    font-size: 10px; padding: 3px 9px; border-radius: 20px;
    background: rgba(99,102,241,0.25); color: #a5b4fc; font-weight: 600;
  }
  .top-bar .conn-status {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary);
  }
  .top-bar .conn-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    animation: pulse 2s infinite;
  }
  .top-bar .conn-dot.offline { background: #ef4444; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* ── 主内容网格 ──────────────────────────────── */
  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    flex: 1; min-height: 0;
    overflow-x: hidden;
  }

  /* ── 左侧面板 ────────────────────────────────── */
  .left-panel { display: flex; flex-direction: column; gap: 14px; min-width: 0; }

  .status-panel { padding: 20px; }
  .section-title {
    font-size: 12px; color: var(--text-secondary); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
  }

  .current-app {
    display: flex; align-items: center; gap: 14px;
    padding: 14px; border-radius: 12px;
    background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);
  }
  .current-app .app-emoji { font-size: 32px; }
  .current-app .app-name { font-size: 18px; font-weight: 700; }
  .current-app .app-raw { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
  }
  .stat-item {
    padding: 12px; border-radius: 10px; text-align: center;
    background: rgba(255,255,255,0.04);
  }
  .stat-value {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-value.active {
    background: linear-gradient(135deg, #34c759, #30d158);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }

  /* ── 应用排行 ──────────────────────────────────── */
  .rank-panel { padding: 20px; flex: 1; }
  .rank-list { display: flex; flex-direction: column; gap: 6px; }
  .rank-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .rank-item .r-num {
    width: 18px; height: 18px; border-radius: 5px;
    background: rgba(99,102,241,0.2); color: #a5b4fc;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .rank-item:nth-child(1) .r-num { background: rgba(234,179,8,0.25); color: #fbbf24; }
  .rank-item:nth-child(2) .r-num { background: rgba(156,163,175,0.25); color: #9ca3af; }
  .rank-item:nth-child(3) .r-num { background: rgba(180,83,9,0.25); color: #d97706; }
  .rank-item .r-icon { font-size: 14px; flex-shrink: 0; }
  .rank-item .r-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-item .r-bar-wrap { width: 70px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.08); flex-shrink: 0; overflow: hidden; }
  .rank-item .r-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #6366f1, #a78bfa); transition: width 0.5s ease; }
  .rank-item .r-time { font-size: 10px; color: var(--text-secondary); flex-shrink: 0; width: 66px; text-align: right; }
  .no-data { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 8px 0; }

  /* ── 右侧：聊天 ──────────────────────────────── */
  .chat-panel {
    display: flex; flex-direction: column; overflow: hidden; padding: 0;
    min-width: 0;
  }
  .chat-header {
    padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.1);
    font-weight: 600; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px 18px;
    display: flex; flex-direction: column; gap: 7px;
    min-height: 300px; max-height: 600px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .msg {
    max-width: 85%; padding: 7px 11px;
    font-size: 12px; line-height: 1.5;
    animation: msgIn 0.25s ease;
    word-break: break-word;
    overflow-wrap: break-word;
    min-width: 0;
  }
  @keyframes msgIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
  .msg.admin {
    align-self: flex-end;
    background: rgba(99,102,241,0.2); border-radius: 12px 12px 4px 12px;
    border: 1px solid rgba(99,102,241,0.25);
  }
  .msg.viewer {
    align-self: flex-start;
    background: rgba(52,199,89,0.15); border-radius: 12px 12px 12px 4px;
    border: 1px solid rgba(52,199,89,0.25);
  }
  .msg .msg-sender { font-size:9px; opacity:0.5; margin-bottom:2px; }
  .msg .msg-time { font-size:8px; opacity:0.35; margin-top:3px; text-align:right; }

  .chat-input-bar {
    padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.1);
    display: flex; gap: 8px; align-items: center;
  }
  .chat-input {
    flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 9px 12px;
    color: #fff; font-size: 12px; outline: none;
    transition: border-color 0.2s;
  }
  .chat-input::placeholder { color: rgba(255,255,255,0.3); }
  .chat-input:focus { border-color: rgba(99,102,241,0.4); }
  .chat-send {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; color: #fff; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s; flex-shrink: 0;
  }
  .chat-send:hover { transform: scale(1.08); }
  .chat-send:active { transform: scale(0.95); }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .container { padding: 12px 10px; }
  }
</style>
</head>
<body>

<div class="bg-orb"></div>
<div class="bg-orb"></div>

<div class="container">
  <div class="glass top-bar">
    <h1>🛠️ WAID Admin <span class="badge">管理面板</span></h1>
    <div class="conn-status">
      <div class="conn-dot" id="connDot"></div>
      <span id="connText">已连接</span>
    </div>
  </div>

  <div class="grid">
    <!-- 左侧 -->
    <div class="left-panel">
      <div class="glass status-panel">
        <div class="section-title">📊 实时状态</div>
        <div class="current-app">
          <div class="app-emoji" id="appEmoji">🖥️</div>
          <div>
            <div class="app-name" id="appName">加载中...</div>
            <div class="app-raw" id="appRaw"></div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="todayTime">0m</div>
            <div class="stat-label">今日使用时长</div>
          </div>
          <div class="stat-item">
            <div class="stat-value active" id="idleTime">活跃</div>
            <div class="stat-label">空闲状态</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="viewerCount">0</div>
            <div class="stat-label">在线访客</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="msgCount">0</div>
            <div class="stat-label">消息总数</div>
          </div>
        </div>
      </div>

      <div class="glass rank-panel">
        <div class="section-title">📊 今日应用使用排行</div>
        <div class="rank-list" id="appRankList">
          <div class="no-data">等待数据...</div>
        </div>
      </div>
    </div>

    <!-- 右侧：聊天 -->
    <div class="glass chat-panel">
      <div class="chat-header">💬 消息</div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-bar">
        <input class="chat-input" id="chatInput" type="text" placeholder="输入消息回复访客..." autocomplete="off">
        <button class="chat-send" id="sendBtn" title="发送">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
// ⚠️ 关键修复：Admin 面板使用 /ws/admin-panel，不抢 Admin 客户端的 /ws/admin
const WS_URL = `ws://${location.host}/ws/admin-panel`;
const APP_ICONS = {
  'VS Code': '💻', 'Google Chrome': '🌐', 'Microsoft Edge': '🌐',
  '微信': '💬', 'Weixin': '💬', 'QQ': '🐧', '企业微信': '💼', '钉钉': '📎',
  '文件资源管理器': '📁', '记事本': '📝', 'Word': '📄', 'Excel': '📊',
  'PowerPoint': '📽️', 'Firefox': '🦊', 'Telegram': '✈️', 'Discord': '🎮',
  'Spotify': '🎵', 'PotPlayer': '🎬', 'VLC': '🎬', '终端': '⬛',
  'Python': '🐍', 'Java': '☕', 'IntelliJ IDEA': '🧠', 'WebStorm': '🌐',
  'Visual Studio': '💻', 'WorkBuddy': '🤖', 'Cursor': '💻',
  'Notion': '📝', 'Obsidian': '🗂️', 'Figma': '🎨', 'Steam': '🎮', 'eFind': '🔍',
};

const $appName = document.getElementById('appName');
const $appRaw = document.getElementById('appRaw');
const $appEmoji = document.getElementById('appEmoji');
const $todayTime = document.getElementById('todayTime');
const $idleTime = document.getElementById('idleTime');
const $viewerCount = document.getElementById('viewerCount');
const $msgCount = document.getElementById('msgCount');
const $appRankList = document.getElementById('appRankList');
const $chatMessages = document.getElementById('chatMessages');
const $chatInput = document.getElementById('chatInput');
const $sendBtn = document.getElementById('sendBtn');
const $connDot = document.getElementById('connDot');
const $connText = document.getElementById('connText');

let ws = null;
let reconnectDelay = 1000;
let totalMsgCount = 0;

function formatDuration(seconds) {
  if (!seconds || seconds <= 0) return '0分0秒';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}小时${m}分${s}秒`;
  return `${m}分${s}秒`;
}

function formatTime(timestamp) {
  return new Date(timestamp * 1000).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function updateStatus(data) {
  $appName.textContent = data.app || '离线';
  $appRaw.textContent = data.app_raw ? `进程: ${data.app_raw}` : '';
  $appEmoji.textContent = APP_ICONS[data.app] || '🖥️';
  $todayTime.textContent = formatDuration(data.today_seconds || 0);

  const idle = data.idle_seconds || 0;
  if (idle < 60) {
    $idleTime.textContent = '活跃';
    $idleTime.className = 'stat-value active';
  } else {
    $idleTime.textContent = formatDuration(idle);
    $idleTime.className = 'stat-value';
  }

  // 更新应用排行
  updateAppRank(data.app_times || []);
}

function updateAppRank(appTimes) {
  if (!appTimes || appTimes.length === 0) {
    $appRankList.innerHTML = '<div class="no-data">等待数据...</div>';
    return;
  }
  const maxTime = appTimes[0] ? appTimes[0][1] : 1;
  let html = '';
  appTimes.forEach(([name, seconds], i) => {
    const icon = APP_ICONS[name] || '🖥️';
    const pct = maxTime > 0 ? (seconds / maxTime * 100) : 0;
    html += `
      <div class="rank-item">
        <div class="r-num">${i + 1}</div>
        <div class="r-icon">${icon}</div>
        <div class="r-name">${escapeHtml(name)}</div>
        <div class="r-bar-wrap"><div class="r-bar" style="width:${pct}%"></div></div>
        <div class="r-time">${formatDuration(seconds)}</div>
      </div>
    `;
  });
  $appRankList.innerHTML = html;
}

function addMessage(sender, content, timestamp, animate = true) {
  totalMsgCount++;
  $msgCount.textContent = totalMsgCount;
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  if (!animate) div.style.animation = 'none';
  const senderLabel = sender === 'admin' ? '我' : '访客';
  div.innerHTML = `
    <div class="msg-sender">${senderLabel}</div>
    <div>${escapeHtml(content)}</div>
    <div class="msg-time">${formatTime(timestamp)}</div>
  `;
  $chatMessages.appendChild(div);
  $chatMessages.scrollTop = $chatMessages.scrollHeight;
}

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    $connDot.classList.remove('offline');
    $connText.textContent = '已连接';
    reconnectDelay = 1000;
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'status') updateStatus(msg.data);
    else if (msg.type === 'chat') addMessage(msg.data.sender, msg.data.content, msg.data.timestamp);
    else if (msg.type === 'history') {
      totalMsgCount = 0;
      msg.data.forEach(m => addMessage(m.sender, m.content, m.timestamp, false));
    }
  };

  ws.onclose = () => {
    $connDot.classList.add('offline');
    $connText.textContent = '重连中...';
    setTimeout(() => { reconnectDelay = Math.min(reconnectDelay * 1.5, 10000); connect(); }, reconnectDelay);
  };

  ws.onerror = () => ws.close();
}

function sendMessage() {
  const content = $chatInput.value.trim();
  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'chat', content }));
  $chatInput.value = '';
}

$sendBtn.addEventListener('click', sendMessage);
$chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

setInterval(async () => {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    updateStatus(data);
  } catch(e) {}
}, 10000);

connect();
</script>
</body>
</html>
